gaussianwam_root: ${oc.env:GAUSSIANWAM_ROOT,/data/zijianzhang/gaussianwam_data}
libero_data_root: ${oc.env:LIBERO_DATA_ROOT,${data.gaussianwam_root}/data/libero_mujoco3.3.2}
libero_text_cache_root: ${data.gaussianwam_root}/data/text_embeds_cache/libero
libero_teacher_root: ${data.gaussianwam_root}/data/libero_teacher_cache

train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ${data.libero_data_root}/libero_spatial_no_noops_lerobot
    - ${data.libero_data_root}/libero_object_no_noops_lerobot
    - ${data.libero_data_root}/libero_goal_no_noops_lerobot
    - ${data.libero_data_root}/libero_10_no_noops_lerobot
  episode_subset_manifest: null
  shape_meta:
    images:
      - key: image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
      - key: wrist_image
        raw_shape: [3, 512, 512]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 8
        shape: 8
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [224, 448]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 2
    action_output_dim: 7
    proprio_output_dim: 8
    delta_action_dim_mask:
      default: [true, true, true, true, true, true, false]
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: min/max
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ${data.libero_text_cache_root}
  context_len: 128
  gaussian_teacher:
    enabled: true
    manifest_path: ${data.libero_teacher_root}/v1/gaussian_vggt256text_3d_libero_firstframe_all_v1/train/manifest.jsonl
    restrict_to_cache: false
    expected_target_offset: 0
    expected_camera_keys: [image, wrist_image]
    expected_mosaic:
      layout: horizontal
      grid_size: [14, 28]
      tiles:
        image:
          rows: [0, 14]
          cols: [0, 14]
        wrist_image:
          rows: [0, 14]
          cols: [14, 28]
