train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/robotwin2.0/robotwin2.0
  episode_subset_manifest: null
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: true
  pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/robotwin
  context_len: 128
  gaussian_teacher:
    enabled: true
    manifest_path: ./data/robotwin2.0/gaussian_teacher_cache/v4/gaussian_vggt256text_3d_first_demo_subset_v1/train/manifest.jsonl
    restrict_to_cache: false
    expected_target_offset: 32
    expected_camera_keys: [cam_high, cam_left_wrist, cam_right_wrist]
    expected_mosaic:
      layout: robotwin
      grid_size: [24, 20]
      tiles:
        cam_high:
          rows: [0, 16]
          cols: [0, 20]
        cam_left_wrist:
          rows: [16, 24]
          cols: [0, 10]
        cam_right_wrist:
          rows: [16, 24]
          cols: [10, 20]

val:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/robotwin2.0/robotwin2.0/
  episode_subset_manifest: null
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: false
  pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/robotwin
  context_len: 128

gaussian_teacher:
  enabled: false
  cache_dir: ./data/robotwin2.0/gaussian_teacher_cache
  targets:
    dense_3d: true
    depth: true
    alpha: true
    valid_mask: true
  latent_alignment: last_frame
